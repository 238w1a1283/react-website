    <!-- ReactDOM -->

    <!-- Babel -->
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"> </script>

    <script type="text/babel">
       
         
           // <div>
           //   <button> hello</button>
            //  <p> paragraph of text {2+2}</p>
           // </div>
           function ChatMessage({message , sender}){
           // const message = props.message;
            //const sender = props.sender;
           // const {message , sender} = props;

           /* if(sender=== 'robot'){
                return (
                        <div>
                            <img src="robot.png" width="50"></img>
                            {message}
                        </div>
                    );
            }
                    */
            return(
                <div>
                    {sender === 'robot' && <img src ="robot.png" width ="50"/>}
                {message}
                    {sender === 'user' && <img src ="user.png" width="50"/>}
                
                </div>
            );
           }
          
           function ChatMessages({chatMessages}){
              return(
                <>
            
              {chatMessages.map((msg) => {
                    return(
                        <ChatMessage 
                        message = {msg.message}
                        sender = {msg.sender}
                        key= {msg.id}
                        />
                    );
              })}
              </>
            );
           }
        
         function App(){
           
             const [chatMessages,setChatMessages] =React.useState([
                {
                    message:'Hello Chatbot',
                    sender:'user',
                    id:'id1'
                    },
                    {
                    message:'How can I help you',
                    sender:'robot',
                    id:'id2'
               },
               {
                   message:'can you get me todays date',
                    sender:'user',
                    id:'id3'
                
               },
               {
                 message:'Today is september 27',
                    sender:'robot',
                    id:'id4'
               }
             ]);
             function addMessage (text){
                const newMessage ={
                    message:text,
                    sender:'user',
                    id:crypto.randomUUID()
                };
                const response = Chatbot.getResponse(text);

                const botMessage ={
                    message:response,
                    sender:'robot',
                    id:crypto.randomUUID()


                };
                setChatMessages(prev =>[
                    ...prev,
                    newMessage,
                    botMessage

                ]);
             }
            return(
                    <div>
                    <ChatInput onSend={addMessage}/>
                    <ChatMessages chatMessages={chatMessages}/>
                </div>
            );
         }
       
           function LoginForm(){

           function ProductDetails({name,price}){
            return(
                <div style={{ 
                    width:"200px",
                    display:"flex",
                    flexDirection:"column",
                    gap:"5px",
                    border:"1px solid #ccc",

                }}>
                  <p>{name}</p>

                  <button>Add to Cart</button>

           }
           function EcommerceApp(){
            return(
                <div style={{
                    display:"flex",
                    justifyContent:"flex-end",
                    gap:"15px"

                }}>
                <ProductDetails name="Cotton Socks" price="10.90"/>
                <ProductDetails name="Tennis Balls" price="6.00"/>
                <ProductDetails name="T-shirt" price="15.50"/>
                    </div>
            );
           }
            function ChatInput({onSend}){
                const [inputText,setInputText] = React.useState('');
                function saveInputText(event){
                    setInputText(event.target.value);
                }
                function sendMessage(){
                    onSend(inputText);
                    setInputText('');
                }
                return (
                    <>
                        <input
                         placeholder="send a message to chatbot"
                         size="30"
                         value={inputText}
                         onChange={saveInputText}
                         />
                        <button onClick={sendMessage}> Send</button>
                    </>
                );
           }
     const container = document.querySelector('.js-container');
    
        const root = ReactDOM.createRoot(container);
        const date = dayjs().format('MMMM D');
        root.render(<App/>);
    </script>   
</body>
