<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>chatbot</title>
    <style>
        body{
            font-family: Arial;
            margin-left:0px;
            margin:0;
        }
        .send-button{
            background-color: rgb(25,135, 84);
            color : white;
            padding : 12px 20px;
            margin-left : 10px;
            border:none;
            border-radius:10px;  
            font-size : 15px;
            cursor: pointer;    }
            .chat-input{
                padding:12px 12px;
                border-radius : 10px;
                border-width :1px;
                font-size:15px;
                flex-grow:1;
            }
            .chat-input-container{
                display:flex;
                margin-bottom:60px;
            
            }
            .app-container{
            max-width: 600px;
            margin-left:auto;
            margin-right:auto;
            height:100vh;
            display:flex;
            flex-direction : column;

            }
            .chat-message-user{
                display:flex;
                justify-content:end;
                align-items:start;

            }
            .chat-message-robot{
                display:flex;
                align-items:start;
        
            }
            .chat-message-text{
                background-color:rgb(238,238,238);
                padding:15px 20px;
                border-radius:10px;margin-right:10px;
                margin-left:10px;
                margin-bottom:20px;
                max-width:300px;

            }
            .chat-message-profile{
                width:45px;
            }
            .chat-Messages-container{
                flex-grow:1;
                margin-top:20px;
                overflow-y:scroll;
                scrollbar-width: none;
            }
    </style>
</head>@
<body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"> </script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"> </script>
    <!-- React -->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>

    <!-- ReactDOM -->
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"> </script>

    <script type="text/babel">
       
         
           // <div>
           //   <button> hello</button>
            //  <p> paragraph of text {2+2}</p>
           // </div>
           function ChatMessage({message , sender}){
           // const message = props.message;
            //const sender = props.sender;
           // const {message , sender} = props;

           /* if(sender=== 'robot'){
                return (
                        <div>
                            <img src="robot.png" width="50"></img>
                            {message}
                        </div>
                    );
            }
                    */
            return(
                <div className = {
                    sender === 'user'?'chat-message-user':'chat-message-robot'
                }>
                    {sender === 'robot' && <img src ="robot.png" className="chat-message-profile"/>}
                    <div className="chat-message-text">
                {message}
                </div >
                    {sender === 'user' && <img src ="user.png" className="chat-message-profile"/>}
                
                </div>
            );
           }
          
           function ChatMessages({chatMessages}){
            const chatMessagesRef = React.useRef(null);
            React.useEffect(()=>{
              const containerElem = chatMessagesRef.current;
              if(containerElem){
                containerElem.scrollTop = containerElem.scrollHeight;
              }
            },[chatMessages]);
              return(
                <div className="chat-Messages-container"
                ref={chatMessagesRef}>
                
              {chatMessages.map((msg) => {

                    return(
                        <ChatMessage 
                        message = {msg.message}
                        sender = {msg.sender}
                        key= {msg.id}
                        />
                    );
              })}
              </div>
            );
           }
        
         function App(){
           
             const [chatMessages,setChatMessages] =React.useState([
                {
                    message:'Hello Chatbot',
                    sender:'user',
                    id:'id1'
                    },
                    {
                    message:'How can I help you',
                    sender:'robot',
                    id:'id2'
               },
               {
                   message:'can you get me todays date',
                    sender:'user',
                    id:'id3'
                
               },
               {
                 message:'Today is september 27',
                    sender:'robot',
                    id:'id4'
               }
             ]);
             function addMessage (text){
                const newMessage ={
                    message:text,
                    sender:'user',
                    id:crypto.randomUUID()
                };
                const response = Chatbot.getResponse(text);

                const botMessage ={
                    message:response,
                    sender:'robot',
                    id:crypto.randomUUID()


                };
                setChatMessages(prev =>[
                    ...prev,
                    newMessage,
                    botMessage

                ]);
             }
            return(
                    <div className="app-container">
                  
                    <ChatMessages chatMessages={chatMessages}/>
                    <ChatInput onSend={addMessage}/>
                   
                </div>

            );
         }
       
           function LoginForm(){
            return(
              <>
              
               <div style={{
                display:"flex" , 
               flexDirection:"column" ,
                gap:"10px",
                width:"300px",
                margin : "20px auto"
            }}>
                <input
                 placeholder="Email"
                   style={{width:"100%",padding:"8px"}}/>
                <input type="Password" placeholder="Password"  
                 style={{width:"100%",padding:"8px"}}/>
                
                </div>
              

            <div style={{display:"flex" ,gap:"1px",justifyContent:"center"}}>

            <button> Login</button>
            <button> Sign Up</button>   
            </div>
            </>
            );
           }
           function ProductDetails({name,price}){
            return(
                <div style={{ 
                    width:"200px",
                    display:"flex",
                    flexDirection:"column",
                    gap:"5px",
                    border:"1px solid #ccc",
                    padding:"10px",
                    borderRadius:"8px"
                }}>
                  <p>{name}</p> 
                  <p> Price : ${price}</p>
                  <button>Add to Cart</button>
                </div>
            );
           }
           function EcommerceApp(){
            return(
                <div style={{
                    display:"flex",
                    justifyContent:"flex-end",
                    gap:"15px"

                }}>
                <ProductDetails name="Cotton Socks" price="10.90"/>
                <ProductDetails name="Tennis Balls" price="6.00"/>
                <ProductDetails name="T-shirt" price="15.50"/>
                    </div>
            );
           }
            function ChatInput({onSend}){
                const [inputText,setInputText] = React.useState('');
                function saveInputText(event){
                    setInputText(event.target.value);
                }
                function sendMessage(){
                    if(!inputText.trim()){
                        return;
                        }
                    onSend(inputText);
                    setInputText('');
                }
                return (
                    <div className="chat-input-container">
                        <input
                         placeholder="send a message to chatbot"
                         size="30"
                         value={inputText}
                         onChange={saveInputText}
                         className="chat-input"
                         />
                        <button onClick={sendMessage}
                        className="send-button"> Send</button>
                    </div>
                );
           }
     const container = document.querySelector('.js-container');
    
        const root = ReactDOM.createRoot(container);
        const date = dayjs().format('MMMM D');
        root.render(<App/>);
    </script>   
</body>
</html>
